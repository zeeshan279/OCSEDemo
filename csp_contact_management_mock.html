    function cloneStakeholderMappings(mappings) {
      return Object.entries(mappings).reduce((acc, [group, stakeholders]) => {
        acc[group] = [...stakeholders];
        return acc;
      }, {});
    }

    function loadStakeholderMappings() {
      const storedValue = localStorage.getItem(stakeholderStorageKey);
      if (!storedValue) return cloneStakeholderMappings(defaultStakeholderMappings);

      try {
        const parsed = JSON.parse(storedValue);
        return Object.entries(parsed).reduce((acc, [group, stakeholders]) => {
          if (typeof group !== 'string' || !Array.isArray(stakeholders)) return acc;
          const cleanedGroup = group.trim();
          const cleanedStakeholders = [...new Set(stakeholders.map((name) => String(name).trim()).filter(Boolean))];
          if (cleanedGroup && cleanedStakeholders.length > 0) {
            acc[cleanedGroup] = cleanedStakeholders;
          }
          return acc;
        }, {});
      } catch {
        return cloneStakeholderMappings(defaultStakeholderMappings);
      }

        option.value = stakeholder;
        option.textContent = stakeholder;
        stakeholderFilter.appendChild(option);
      });

      if (selectedStakeholder && stakeholders.includes(selectedStakeholder)) {
        stakeholderFilter.value = selectedStakeholder;
      }
    }

    function updateConditionalFilterVisibility() {
      const selectedGroup = stakeholderGroupFilter.value.trim();
      stakeholderFilterWrapper.hidden = !selectedGroup;
      const shouldShowStateFilter = selectedGroup === 'State & Local Agencies';
      stateFilterWrapper.hidden = !shouldShowStateFilter;
      const shouldShowCompanyFilter = Boolean(selectedGroup) && !shouldShowStateFilter;
      companyFilterWrapper.hidden = !shouldShowCompanyFilter;
      if (!shouldShowStateFilter) {
        stateFilterSelect.value = '';
      }
      if (!shouldShowCompanyFilter) {
        companyFilterInput.value = '';
      }
    }

    function initializeStakeholderFilters() {
      stakeholderGroupFilter.innerHTML = '<option value="">Any Stakeholder Group</option>';
      Object.keys(stakeholderMappings).forEach((group) => {
        const option = document.createElement('option');
        option.value = group;
        option.textContent = group;
        stakeholderGroupFilter.appendChild(option);
      });
      populateStakeholderSelect();
    }

    function refreshStakeholderMappings() {
      const previousGroup = stakeholderGroupFilter.value;
      const previousStakeholder = stakeholderFilter.value;
      stakeholderMappings = loadStakeholderMappings();
      initializeStakeholderFilters();

      if (previousGroup && stakeholderMappings[previousGroup]) {
        stakeholderGroupFilter.value = previousGroup;
        populateStakeholderSelect(previousGroup, previousStakeholder);
      }
    }

    function getResultTags(result) {
      const contactTags = result.tags || defaultTags;
      const relationshipTag = result.relationshipType ? [result.relationshipType] : [];
      return [...relationshipTag, ...contactTags];
    }

    function getFilteredResults() {
      const query = searchQuery.value.trim().toLowerCase();
      const stateFilter = stateFilterSelect.value.trim().toLowerCase();
      const organizationFilter = companyFilterInput.value.trim().toLowerCase();
      const tagFilter = tagsFilterInput.value.trim().toLowerCase();
      const selectedStakeholderGroup = stakeholderGroupFilter.value.trim();
      const selectedStakeholder = stakeholderFilter.value.trim();

      const matchingResults = seededResults.filter((result) => {
        const searchableContent = `${result.name} ${result.title || ''}`.toLowerCase();
        const queryMatches = !query || searchableContent.includes(query);
        const stateMatches = !stateFilter || (result.state || '').toLowerCase() === stateFilter;
        const organizationName = (result.meta || '').split('<br>')[0].toLowerCase();
        const organizationMatches = !organizationFilter || organizationName.includes(organizationFilter);
        const stakeholderGroupMatches = !selectedStakeholderGroup || result.stakeholderGroup === selectedStakeholderGroup;
        const stakeholderMatches = !selectedStakeholder || result.stakeholder === selectedStakeholder;
        const tags = getResultTags(result).map((tag) => tag.toLowerCase());
        const tagMatches = !tagFilter || tags.some((tag) => tag.includes(tagFilter));
        return queryMatches && stateMatches && organizationMatches && stakeholderGroupMatches && stakeholderMatches && tagMatches;
      });

      const seenContacts = new Set();
      const dedupedResults = matchingResults.filter((result) => {
        const key = result.name.trim().toLowerCase();
        if (seenContacts.has(key)) return false;
        seenContacts.add(key);
        return true;
      });
      const sortOption = sortResultsSelect.value;
      if (sortOption === 'Recently Updated' || sortOption === 'Last Updated') {
        return dedupedResults.sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated));
      }
      if (sortOption === 'Last Name A-Z') {
        return dedupedResults.sort((a, b) => {
          const aLastName = a.name.split(' ').slice(-1)[0];
          const bLastName = b.name.split(' ').slice(-1)[0];
          return aLastName.localeCompare(bLastName);
        });
      }
      if (sortOption === 'Organization A-Z') {
        return dedupedResults.sort((a, b) => {
          const aOrg = a.meta.split('<br>')[0] || '';
          const bOrg = b.meta.split('<br>')[0] || '';
          return aOrg.localeCompare(bOrg);
        });
      }
      return dedupedResults;
    }

    function getTotalPages(resultCount) {
      return Math.max(1, Math.ceil(resultCount / pageSize));
    }

    function renderResults() {
      const filteredResults = getFilteredResults();
      const totalPages = getTotalPages(filteredResults.length);
      currentPage = Math.min(Math.max(1, currentPage), totalPages);
      const start = (currentPage - 1) * pageSize;
      const pageResults = filteredResults.slice(start, start + pageSize);
      const query = searchQuery.value.trim() || 'all contacts';

      resultsSummary.innerHTML = `<strong>${filteredResults.length} results</strong> for “${query}”`;
      resultsList.innerHTML = '';
      emptyResults.hidden = pageResults.length > 0;

      pageResults.forEach((result, pageIndex) => {
        const li = document.createElement('li');
        li.className = 'usa-collection__item';

        const hiddenBadges = new Set(['Possible Duplicate', 'Name Variant', 'Active']);
        const visibleBadges = (result.badges || []).reduce((acc, badge, index) => {
          if (!hiddenBadges.has(badge)) {
            acc.push(`<span class="usa-tag ${result.badgeClasses?.[index] || ''}">${badge}</span>`);
          }
          return acc;
        }, []);

        const tags = `<div class="result-tags">${getResultTags(result).map((tag) => `<span class="usa-tag">${tag}</span>`).join('')}</div>`;

        const defaultMetrics = [
          { label: 'Last Updated', value: result.lastUpdated },
          { label: 'Updated By', value: result.name },
          { label: 'Source Application', value: (result.tags && result.tags[0]) || 'Contact Management' }
        ];
        const metricsData = result.metrics || defaultMetrics;
        const metrics = `<div class="metrics-grid">${metricsData.map((metric) => `<div class="metric"><span class="metric-label">${metric.label}</span><span class="metric-value">${metric.value}</span></div>`).join('')}</div>`;
        const badges = visibleBadges.join(' ');

        li.innerHTML = `
          <article class="result-content ${result.active ? 'result-content--active' : ''}">
            <div>
              <h4 class="margin-y-0">${result.name}${badges ? ` ${badges}` : ""}</h4>
              <p class="margin-top-05 margin-bottom-05 text-bold">${result.title || 'No title provided'}</p>
              <p class="result-meta">${result.meta}</p>
              ${tags}
            </div>
            <div class="result-side">
              ${metrics}
              <div class="result-action"><a href="full_contact_details.html" class="usa-button usa-button--outline">View details</a></div>
            </div>
          </article>
        `;

        resultsList.appendChild(li);
      });

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      paginationWrapper.hidden = totalPages <= 1;
      pagination.innerHTML = '';

      if (totalPages <= 1) return;

      const list = document.createElement('ul');
      list.className = 'usa-pagination__list';

      const previousDisabled = currentPage === 1 ? 'usa-pagination__link--disabled' : '';
      list.insertAdjacentHTML('beforeend', `
        <li class="usa-pagination__item usa-pagination__arrow">
          <a class="usa-pagination__link usa-pagination__previous-page ${previousDisabled}" href="#" data-page="${currentPage - 1}" aria-label="Previous page">
            <svg class="usa-icon" aria-hidden="true" role="img"><use href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/img/sprite.svg#navigate_before"></use></svg>
            <span class="usa-pagination__link-text">Previous</span>
          </a>
        </li>
      `);

      for (let page = 1; page <= totalPages; page += 1) {
        const currentMarkup = page === currentPage
          ? `<li class="usa-pagination__item usa-pagination__page-no"><a class="usa-pagination__button usa-current" href="#" aria-current="page" data-page="${page}">${page}</a></li>`
          : `<li class="usa-pagination__item usa-pagination__page-no"><a class="usa-pagination__button" href="#" data-page="${page}">${page}</a></li>`;
        list.insertAdjacentHTML('beforeend', currentMarkup);
      }

      const nextDisabled = currentPage === totalPages ? 'usa-pagination__link--disabled' : '';
      list.insertAdjacentHTML('beforeend', `
        <li class="usa-pagination__item usa-pagination__arrow">
          <a class="usa-pagination__link usa-pagination__next-page ${nextDisabled}" href="#" data-page="${currentPage + 1}" aria-label="Next page">
            <span class="usa-pagination__link-text">Next</span>
            <svg class="usa-icon" aria-hidden="true" role="img"><use href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/img/sprite.svg#navigate_next"></use></svg>
          </a>
        </li>
      `);

      pagination.appendChild(list);
    }

    pagination.addEventListener('click', (event) => {
      const link = event.target.closest('a[data-page]');
      if (!link) return;

      event.preventDefault();
      const targetPage = Number(link.dataset.page);
      const totalPages = getTotalPages(getFilteredResults().length);
      if (!Number.isNaN(targetPage) && targetPage >= 1 && targetPage <= totalPages) {
        currentPage = targetPage;
        renderResults();
      }
    });

    searchButton.addEventListener('click', () => {
      currentPage = 1;
      resultsPanel.hidden = false;
      renderResults();
    });

    stakeholderGroupFilter.addEventListener('change', () => {
      populateStakeholderSelect(stakeholderGroupFilter.value);
      if (resultsPanel.hidden) return;
      currentPage = 1;
      renderResults();
    });

    stakeholderFilter.addEventListener('change', () => {
      if (resultsPanel.hidden) return;
      currentPage = 1;
      renderResults();
    });

    stateFilterSelect.addEventListener('change', () => {
      if (resultsPanel.hidden) return;
      currentPage = 1;
      renderResults();
    });

    clearButton.addEventListener('click', () => {
      searchQuery.value = '';
      stateFilterSelect.value = '';
      stakeholderGroupFilter.value = '';
      stakeholderGroupFilter.dispatchEvent(new Event('change'));
      companyFilterInput.value = '';
      tagsFilterInput.value = '';
      sortResultsSelect.value = 'Best Match';
      resultsList.innerHTML = '';
      resultsSummary.textContent = 'No results to display.';
      emptyResults.hidden = false;
      pagination.innerHTML = '';
      paginationWrapper.hidden = true;
      resultsPanel.hidden = true;
    });

    sortResultsSelect.addEventListener('change', () => {
      if (resultsPanel.hidden) return;
      currentPage = 1;
      renderResults();
    });

    window.addEventListener('focus', () => {
      refreshStakeholderMappings();
      if (!resultsPanel.hidden) {
        currentPage = 1;
        renderResults();
      }
    });

    window.addEventListener('storage', (event) => {
      if (event.key !== stakeholderStorageKey) return;
      refreshStakeholderMappings();
      if (!resultsPanel.hidden) {
        currentPage = 1;
        renderResults();
      }
    });

    initializeStakeholderFilters();
    updateConditionalFilterVisibility();
  </script>
  <script>
    const menuToggle = document.getElementById('menu-toggle');
    if (menuToggle) {
      menuToggle.addEventListener('click', () => {
        const appShell = document.querySelector('.app-shell');
        appShell.classList.toggle('menu-hidden');
        menuToggle.textContent = appShell.classList.contains('menu-hidden') ? 'Show menu' : 'Hide menu';
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/js/uswds.min.js"></script>
</body>
</html>
