<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSP Contact Search (USWDS)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/css/uswds.min.css" />
  <style>
    .app-shell { min-height: 100vh; background: var(--usa-color-base-lightest); }
    .app-sidebar { background: var(--usa-color-primary-darker); color: var(--usa-color-base-darkest); padding: 1rem; }
    .app-sidebar .usa-sidenav a { color: var(--usa-color-base-darkest); display: flex; align-items: center; gap: 0.5rem; }
    .app-sidebar .usa-current { background-color: transparent; color: var(--usa-color-base-darkest); font-weight: 700; }
    .app-main { padding: 1.5rem; }
    .app-shell.menu-hidden { grid-template-columns: 1fr !important; }
    .app-shell.menu-hidden .app-sidebar { display: none; }
    .menu-toggle { margin-left: auto; }
    .menu-icon { width: 1.1rem; height: 1.1rem; fill: currentColor; }
    .search-layout { display: grid; grid-template-columns: minmax(300px, 390px) 1fr; gap: 1rem; align-items: start; }
    .result-list .usa-collection__item { padding: 1rem 0; }
    .result-content { display: block; }
    .result-content--active { border-left: 0.25rem solid var(--usa-color-primary); padding-left: 0.75rem; }
    .result-action { margin-top: 0.75rem; }
    .result-action .usa-button { width: 100%; margin-right: 0; }
    .result-meta { margin: 0.5rem 0; color: var(--usa-color-base-dark); font-size: 0.95rem; }
    .result-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.75rem; }
    .result-activity { border-left: 0.25rem solid var(--usa-color-primary-lighter); background: var(--usa-color-primary-lightest); padding: 0.75rem; margin-bottom: 0.75rem; border-radius: 0.25rem; }
    .result-activity__label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--usa-color-primary-dark); margin-bottom: 0.25rem; font-weight: 700; }
    .result-activity__text { margin: 0; color: var(--usa-color-base-darkest); font-size: 0.95rem; }
    .metrics-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.5rem; }
    .metric { border: 1px solid var(--usa-color-base-lighter); border-radius: 0.35rem; padding: 0.5rem; background: var(--usa-color-base-lightest); }
    .metric-label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--usa-color-base-dark); letter-spacing: 0.04em; }
    .metric-value { font-weight: 700; font-size: 0.95rem; }
    .pagination-wrapper { margin-top: 1rem; display: flex; justify-content: flex-end; }
    @media (max-width: 63.99em) {
      .search-layout, .result-content, .metrics-grid { grid-template-columns: 1fr; }
      .app-sidebar { margin-bottom: 1rem; }
      .pagination-wrapper { justify-content: flex-start; }
      .result-action .usa-button { width: auto; }
    }
    @media (min-width: 64em) {
      .app-shell { display: grid; grid-template-columns: 260px 1fr; }
    }
  </style>
</head>
<body>
  <a class="usa-skipnav" href="#main-content">Skip to main content</a>

  <div class="app-shell menu-hidden">
    <aside class="app-sidebar" aria-label="Primary navigation">
      <h1 class="margin-top-0 font-sans-lg">CSP Contacts</h1>
      <nav aria-label="Section navigation">
        <ul class="usa-sidenav margin-top-2">
          <li class="usa-sidenav__item"><a class="usa-current" href="csp_contact_management_mock.html" aria-current="page"><svg class="menu-icon" aria-hidden="true"><use href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/img/sprite.svg#search"></use></svg>Search</a></li>
          <li class="usa-sidenav__item"><a href="create_contact.html"><svg class="menu-icon" aria-hidden="true"><use href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/img/sprite.svg#add"></use></svg>Create</a></li>
          <li class="usa-sidenav__item"><a href="duplicate_review_merge.html"><svg class="menu-icon" aria-hidden="true"><use href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/img/sprite.svg#content_copy"></use></svg>Duplicate Review</a></li>
        </ul>
      </nav>
    </aside>

    <main class="app-main" id="main-content">
      <header class="display-flex flex-justify flex-align-center margin-bottom-2">
        <h2 class="margin-y-0">Contact Search</h2>
        <div class="display-flex flex-align-center gap-1">
          <button id="menu-toggle" class="usa-button usa-button--outline" type="button">Show menu</button>
          <a href="create_contact.html" class="usa-button">New Contact</a>
        </div>
      </header>

      <div class="search-layout">
        <section class="usa-card">
          <div class="usa-card__container">
            <div class="usa-card__header">
              <h3 class="usa-card__heading">Search filters</h3>
            </div>
            <div class="usa-card__body">
              <label class="usa-label" for="search-query">Search</label>
              <input class="usa-input" id="search-query" placeholder="Name, Company, FEIN, or Email" value="Mitchell" />

              <div class="grid-row grid-gap margin-top-2">
                <div class="tablet:grid-col-6">
                  <label class="usa-label" for="application">Application</label>
                  <select class="usa-select" id="application">
                    <option>Application</option>
                    <option selected>Locate</option>
                    <option>State Profile Admin</option>
                    <option>Employer Services</option>
                    <option>IRG</option>
                    <option>Data Access</option>
                    <option>Federal Collections</option>
                    <option>Insurance Match</option>
                    <option>Communication Center</option>
                  </select>
                </div>
                <div class="tablet:grid-col-6">
                  <label class="usa-label" for="status-filter">Status</label>
                  <select class="usa-select" id="status-filter">
                    <option selected>Active</option>
                    <option>Pending Approval</option>
                    <option>Inactive</option>
                  </select>
                </div>
              </div>

              <div class="grid-row grid-gap margin-top-2">
                <div class="tablet:grid-col-6">
                  <label class="usa-label" for="relationship-type">Relationship type</label>
                  <select class="usa-select" id="relationship-type">
                    <option>Relationship Type</option>
                    <option selected>State IV-D Agency</option>
                    <option>Tribal IV-D Agency</option>
                    <option>Employer</option>
                    <option>Federal Agency</option>
                    <option>International Partner</option>
                    <option>Vendor / Contractor</option>
                    <option>OCSE Internal</option>
                  </select>
                </div>
                <div class="tablet:grid-col-6">
                  <label class="usa-label" for="role-filter">Contact role</label>
                  <select class="usa-select" id="role-filter">
                    <option selected>Any Role</option>
                    <option>Primary Contact</option>
                    <option>Technical Contact</option>
                    <option>Business Contact</option>
                  </select>
                </div>
              </div>

              <h4 class="margin-top-3 margin-bottom-1">Advanced filters</h4>
              <div class="grid-row grid-gap">
                <div class="tablet:grid-col-6"><label class="usa-label" for="fein">FEIN (Employer)</label><input class="usa-input" id="fein" /></div>
                <div class="tablet:grid-col-6"><label class="usa-label" for="company">Company name</label><input class="usa-input" id="company" /></div>
              </div>
              <label class="usa-label margin-top-2" for="tag-filter">Tags</label>
              <input class="usa-input" id="tag-filter" placeholder="Filter by tags (comma-separated, e.g., Locate, Technical Contact)" />
            </div>
            <div class="usa-card__footer display-flex flex-wrap gap-1">
              <button id="search-button" class="usa-button" type="button">Search</button>
              <button id="clear-button" class="usa-button usa-button--outline" type="button">Clear</button>
            </div>
          </div>
        </section>

        <section id="results-panel" class="usa-card" aria-label="Search Results" hidden>
          <div class="usa-card__container">
            <div class="usa-card__header display-flex flex-justify flex-align-end flex-wrap gap-1">
              <div>
                <h3 class="usa-card__heading">Search Results</h3>
                <p id="results-summary" class="margin-top-05 margin-bottom-0">No results to display.</p>
              </div>
              <div>
                <label class="usa-label margin-top-0" for="sort-results">Sort results</label>
                <select class="usa-select" id="sort-results">
                  <option selected>Best Match</option>
                  <option>Recently Updated</option>
                  <option>Last Name A-Z</option>
                  <option>Organization A-Z</option>
                </select>
              </div>
            </div>
            <div class="usa-card__body">
              <div class="usa-alert usa-alert--info" role="status">
                <div class="usa-alert__body"><p class="usa-alert__text">Tip: Use FEIN + Application to narrow duplicates.</p></div>
              </div>

              <div id="empty-results" class="usa-alert usa-alert--warning margin-top-2" role="status">
                <div class="usa-alert__body"><p class="usa-alert__text">Run a search to load contact results.</p></div>
              </div>

              <ul id="results-list" class="usa-collection result-list" aria-label="Contact search result list"></ul>

              <div id="pagination-wrapper" class="pagination-wrapper" hidden>
                <nav id="pagination" class="usa-pagination" aria-label="Search results pagination"></nav>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const resultsPanel = document.getElementById('results-panel');
    const resultsList = document.getElementById('results-list');
    const resultsSummary = document.getElementById('results-summary');
    const emptyResults = document.getElementById('empty-results');
    const paginationWrapper = document.getElementById('pagination-wrapper');
    const pagination = document.getElementById('pagination');
    const searchQuery = document.getElementById('search-query');
    const tagFilterInput = document.getElementById('tag-filter');
    const searchButton = document.getElementById('search-button');
    const clearButton = document.getElementById('clear-button');

    const pageSize = 10;
    let currentPage = 1;
    const searchResults = [
      { name: 'Karen Mitchell', relationshipType: 'State IV-D Agency', badges: ['Primary Match', 'Active'], badgeClasses: ['bg-green-20v text-green-70v', 'bg-blue-20v text-blue-70v'], meta: 'MD Child Support · Director, Locate Operations<br>(410) 555-0187 · karen.mitchell@maryland.gov', tags: ['Locate', 'Technical Contact', 'Primary'], active: true },
      { name: 'Karin Mitchell', relationshipType: 'Tribal IV-D Agency', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Navajo Nation Child Support · Program Liaison<br>(505) 555-0101 · karin.mitchell@navajo.gov', tags: ['IRG', 'Intergovernmental', 'Case Coordination'] },
      { name: 'Kay Mitchell', relationshipType: 'Employer', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Blue Harbor Logistics · Payroll Contact<br>(443) 555-0102 · kay.mitchell@blueharbor.com', tags: ['Employer Services', 'Payroll', 'Wage Withholding'] },
      { name: 'Keisha Mitchell', relationshipType: 'Federal Agency', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Office of Child Support Services · Federal Partner Manager<br>(202) 555-0103 · keisha.mitchell@acf.hhs.gov', tags: ['Federal Collections', 'Policy', 'Escalation'] },
      { name: 'Kendall Mitchell', relationshipType: 'International Partner', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Ontario Family Responsibility Office · Cross-Border Coordinator<br>(613) 555-0104 · kendall.mitchell@ontario.ca', tags: ['International', 'IRG', 'Reciprocity'] },
      { name: 'Kelsey Mitchell', relationshipType: 'Vendor / Contractor', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'CivisTech Solutions · Platform Support Lead<br>(410) 555-0105 · kelsey.mitchell@civistech.com', tags: ['Technical Contact', 'Platform Support', 'Production'] },
      { name: 'Kim Mitchell', relationshipType: 'OCSE Internal', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'OCSE Internal Operations · Access Administrator<br>(202) 555-0106 · kim.mitchell@acf.hhs.gov', tags: ['Data Access', 'Security', 'Admin'] },
      { name: 'Kyle Mitchell', relationshipType: 'Court System', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Maryland Family Court · Judicial Interface Analyst<br>(410) 555-0107 · kyle.mitchell@mdcourts.gov', tags: ['Court Liaison', 'Case Updates', 'Compliance'] },
      { name: 'Kara Mitchell', relationshipType: 'County Agency', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Baltimore County DSS · Regional Supervisor<br>(443) 555-0108 · kara.mitchell@baltimorecountymd.gov', tags: ['Locate', 'Supervisor', 'Regional'] },
      { name: 'Kurt Mitchell', relationshipType: 'State IT Office', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Maryland DoIT · Integration Engineer<br>(410) 555-0109 · kurt.mitchell@maryland.gov', tags: ['Integration', 'State Profile Admin', 'API'] },
      { name: 'Kira Mitchell', relationshipType: 'Financial Institution', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'First Atlantic Bank · Child Support Processing Lead<br>(301) 555-0110 · kira.mitchell@firstatlantic.com', tags: ['Insurance Match', 'Payments', 'Reconciliation'] },
      { name: 'Keenan Mitchell', relationshipType: 'Law Enforcement', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'State Enforcement Unit · Case Investigator<br>(301) 555-0111 · keenan.mitchell@stateenforce.gov', tags: ['Locate', 'Enforcement', 'Field Ops'] },
      { name: 'Kyla Mitchell', relationshipType: 'Healthcare Partner', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Maryland Health Exchange · Eligibility Coordinator<br>(410) 555-0112 · kyla.mitchell@mhbe.gov', tags: ['Eligibility', 'Data Access', 'Verification'] },
      { name: 'Kori Mitchell', relationshipType: 'Education Agency', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Maryland Department of Education · Outreach Specialist<br>(410) 555-0113 · kori.mitchell@maryland.gov', tags: ['Outreach', 'Business Contact', 'Training'] },
      { name: 'Kris Mitchell', relationshipType: 'Military Liaison', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Defense Manpower Data Center · Records Liaison<br>(703) 555-0114 · kris.mitchell@dmc.mil', tags: ['Federal Collections', 'Military', 'Verification'] },
      { name: 'Kristen Mitchell', relationshipType: 'Insurance Provider', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'TriState Benefits Group · Benefits Analyst<br>(240) 555-0115 · kristen.mitchell@tristatebenefits.com', tags: ['Insurance Match', 'Benefits', 'Support'] },
      { name: 'Khalil Mitchell', relationshipType: 'Legal Aid Partner', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Maryland Legal Aid · Family Law Attorney Liaison<br>(410) 555-0116 · khalil.mitchell@mdlegalaid.org', tags: ['Legal', 'Intergovernmental', 'Escalation'] },
      { name: 'Kiara Mitchell', relationshipType: 'Nonprofit Partner', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Families First Coalition · Community Advocate<br>(443) 555-0117 · kiara.mitchell@familiesfirst.org', tags: ['Community', 'Outreach', 'Referrals'] },
      { name: 'Kingston Mitchell', relationshipType: 'Tax Authority', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Comptroller of Maryland · Tax Offset Specialist<br>(410) 555-0118 · kingston.mitchell@marylandtax.gov', tags: ['Federal Collections', 'Offsets', 'Finance'] },
      { name: 'Kaitlyn Mitchell', relationshipType: 'Payment Processor', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'GovPay Processing Services · Disbursement Manager<br>(410) 555-0119 · kaitlyn.mitchell@govpay.com', tags: ['Payments', 'Disbursement', 'Batch Processing'] },
      { name: 'Kaleb Mitchell', relationshipType: 'Call Center Partner', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'CSP Communication Center · Customer Care Lead<br>(410) 555-0120 · kaleb.mitchell@cspcenter.org', tags: ['Communication Center', 'Customer Support', 'Tier 2'] },
      { name: 'Kathryn Mitchell', relationshipType: 'Data Exchange Partner', badges: ['Active'], badgeClasses: ['bg-green-20v text-green-70v'], meta: 'Interstate Data Hub · Exchange Administrator<br>(202) 555-0121 · kathryn.mitchell@idhub.org', tags: ['Data Access', 'Enterprise Liaison', 'Interstate'] }
    ];

    const defaultTags = ['Contact', 'Directory', 'Candidate'];

    function getResultTags(result) {
      const contactTags = result.tags || defaultTags;
      const relationshipTag = result.relationshipType ? [result.relationshipType] : [];
      return [...relationshipTag, ...contactTags];
    }

    function getFilteredResults() {
      const query = searchQuery.value.trim().toLowerCase();
      const tagFilters = tagFilterInput.value
        .split(',')
        .map((tag) => tag.trim().toLowerCase())
        .filter(Boolean);

      const matchingResults = searchResults.filter((result) => {
        const searchableContent = `${result.name} ${result.meta}`.toLowerCase();
        const resultTags = getResultTags(result).map((tag) => tag.toLowerCase());
        const queryMatches = !query
          || searchableContent.includes(query)
          || resultTags.some((tag) => tag.includes(query));
        const tagsMatch = tagFilters.every((filterTag) => resultTags.some((tag) => tag.includes(filterTag)));
        return queryMatches && tagsMatch;
      });

      const seenContacts = new Set();
      return matchingResults.filter((result) => {
        const key = result.name.trim().toLowerCase();
        if (seenContacts.has(key)) return false;
        seenContacts.add(key);
        return true;
      });
    }

    function getTotalPages(resultCount) {
      return Math.max(1, Math.ceil(resultCount / pageSize));
    }

    function renderResults() {
      const filteredResults = getFilteredResults();
      const totalPages = getTotalPages(filteredResults.length);
      currentPage = Math.min(Math.max(1, currentPage), totalPages);
      const start = (currentPage - 1) * pageSize;
      const pageResults = filteredResults.slice(start, start + pageSize);
      const query = searchQuery.value.trim() || 'all contacts';
      const tagQuery = tagFilterInput.value.trim();
      const summaryDetails = tagQuery ? `${query} (tags: ${tagQuery})` : query;

      resultsSummary.innerHTML = `<strong>${filteredResults.length} results</strong> for “${summaryDetails}”`;
      resultsList.innerHTML = '';
      emptyResults.hidden = pageResults.length > 0;

      pageResults.forEach((result, pageIndex) => {
        const li = document.createElement('li');
        li.className = 'usa-collection__item';

        const hiddenBadges = new Set(['Possible Duplicate', 'Name Variant', 'Active']);
        const visibleBadges = (result.badges || []).reduce((acc, badge, index) => {
          if (!hiddenBadges.has(badge)) {
            acc.push(`<span class="usa-tag ${result.badgeClasses?.[index] || ''}">${badge}</span>`);
          }
          return acc;
        }, []);

        const tags = `<div class="result-tags">${getResultTags(result).map((tag) => `<span class="usa-tag">${tag}</span>`).join('')}</div>`;

        const defaultMetrics = [
          { label: 'Last Updated', value: `2026-03-${String(19 - ((start + pageIndex) % 8)).padStart(2, '0')}` },
          { label: 'Updated By', value: result.name },
          { label: 'Duplicates', value: 'Review Needed' }
        ];
        const metricsData = result.metrics || defaultMetrics;
        const metrics = `<div class="metrics-grid">${metricsData.map((metric) => `<div class="metric"><span class="metric-label">${metric.label}</span><span class="metric-value">${metric.value}</span></div>`).join('')}</div>`;
        const badges = visibleBadges.join(' ');

        li.innerHTML = `
          <article class="result-content ${result.active ? 'result-content--active' : ''}">
            <div>
              <h4 class="margin-y-0">${result.name}${badges ? ` ${badges}` : ""}</h4>
              <p class="result-meta">${result.meta}</p>
              ${tags}
              ${metrics}
            </div>
            <div class="result-action"><a href="full_contact_details.html" class="usa-button usa-button--outline">View details</a></div>
          </article>
        `;

        resultsList.appendChild(li);
      });

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      paginationWrapper.hidden = totalPages <= 1;
      pagination.innerHTML = '';

      if (totalPages <= 1) return;

      const list = document.createElement('ul');
      list.className = 'usa-pagination__list';

      const previousDisabled = currentPage === 1 ? 'usa-pagination__link--disabled' : '';
      list.insertAdjacentHTML('beforeend', `
        <li class="usa-pagination__item usa-pagination__arrow">
          <a class="usa-pagination__link usa-pagination__previous-page ${previousDisabled}" href="#" data-page="${currentPage - 1}" aria-label="Previous page">
            <svg class="usa-icon" aria-hidden="true" role="img"><use href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/img/sprite.svg#navigate_before"></use></svg>
            <span class="usa-pagination__link-text">Previous</span>
          </a>
        </li>
      `);

      for (let page = 1; page <= totalPages; page += 1) {
        const currentMarkup = page === currentPage
          ? `<li class="usa-pagination__item usa-pagination__page-no"><a class="usa-pagination__button usa-current" href="#" aria-current="page" data-page="${page}">${page}</a></li>`
          : `<li class="usa-pagination__item usa-pagination__page-no"><a class="usa-pagination__button" href="#" data-page="${page}">${page}</a></li>`;
        list.insertAdjacentHTML('beforeend', currentMarkup);
      }

      const nextDisabled = currentPage === totalPages ? 'usa-pagination__link--disabled' : '';
      list.insertAdjacentHTML('beforeend', `
        <li class="usa-pagination__item usa-pagination__arrow">
          <a class="usa-pagination__link usa-pagination__next-page ${nextDisabled}" href="#" data-page="${currentPage + 1}" aria-label="Next page">
            <span class="usa-pagination__link-text">Next</span>
            <svg class="usa-icon" aria-hidden="true" role="img"><use href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/img/sprite.svg#navigate_next"></use></svg>
          </a>
        </li>
      `);

      pagination.appendChild(list);
    }

    pagination.addEventListener('click', (event) => {
      const link = event.target.closest('a[data-page]');
      if (!link) return;

      event.preventDefault();
      const targetPage = Number(link.dataset.page);
      const totalPages = getTotalPages(getFilteredResults().length);
      if (!Number.isNaN(targetPage) && targetPage >= 1 && targetPage <= totalPages) {
        currentPage = targetPage;
        renderResults();
      }
    });

    searchButton.addEventListener('click', () => {
      currentPage = 1;
      resultsPanel.hidden = false;
      renderResults();
    });

    clearButton.addEventListener('click', () => {
      searchQuery.value = '';
      tagFilterInput.value = '';
      resultsList.innerHTML = '';
      resultsSummary.textContent = 'No results to display.';
      emptyResults.hidden = false;
      pagination.innerHTML = '';
      paginationWrapper.hidden = true;
      resultsPanel.hidden = true;
    });
  </script>
  <script>
    const menuToggle = document.getElementById('menu-toggle');
    if (menuToggle) {
      menuToggle.addEventListener('click', () => {
        const appShell = document.querySelector('.app-shell');
        appShell.classList.toggle('menu-hidden');
        menuToggle.textContent = appShell.classList.contains('menu-hidden') ? 'Show menu' : 'Hide menu';
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.8.1/dist/js/uswds.min.js"></script>
</body>
</html>
